<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="stylesheet" href="style.css">
    <title>We-Do</title>

<body>
    <div class="container mx-auto min-h-screen">
        <!-- nav  -->
        <nav class="flex items-center justify-between">
            <div class="flex items-center space-x-2">
            <img class="logo" src="" alt="logo">

            </div>  
            <ul class="hidden md:flex space-x-3 px-2 py-5">
                <li><a href="#">Home</a></li>
                <li><a href="#">Products</a></li>
                <li><a href="#">How It Works</a></li>
                <li><a href="#">Pricing</a></li>

            </ul>
            <a href="#" class="py-1 px-2 border-y border-x border-salt border-slate-950 rounded-md">Let's Talk</a>

        <!-- hero section -->
        <section class="flex mt-20 space-x-3">

            </div>
            <div class="flex-1 w-1/2">
                <img class="h-64" src="./imgs/webcontent-1.png" alt="webcontent-1">

                <p class="">A group of experts to realize your ideas.</p>
            </div>
            <div class="flex w-6/12 mr-8 space-x-2 overflow-x-scroll">
                <img class="w-24 h-24" src="" alt="img-1">
                <img class="w-24 h-24" src="" alt="img-2">
                <img class="w-24 h-24" src="" alt="img-1">
                <img class="w-24 h-24" src="" alt="img-2">
                <img class="w-24 h-24" src="" alt="img-1">
                <img class="w-24 h-24" src="" alt="img-2">

            <button><img class="absolute top-1/3 right-2 w-6 h-6 border-2 rounded-full" src="./imgs/arrow.svg" alt="move symbol"></button>
